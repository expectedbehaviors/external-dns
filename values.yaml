# Baseline ExternalDNS — single provider per Helm release.
# Instantiate twice (e.g. digitalocean + pihole) with separate values files in your private repo.
external-dns:
  annotationFilter: ""
  clusterDomain: example.com
  domainFilters: [example.com]
  image:
    tag: 0.15.0-debian-12-r1
  logLevel: info
  policy: sync
  publishInternalServices: true
  sources: [ingress]
  replicaCount: 1
  pdb:
    create: true
    minAvailable: 1
  provider: digitalocean
  digitalocean:
    secretName: digitalocean
  excludeDomains:
    - example.com
    - '*.example.com'
onepassworditem:
  enabled: true
  defaultVault: Kubernetes
  items:
    - item: digitalocean
